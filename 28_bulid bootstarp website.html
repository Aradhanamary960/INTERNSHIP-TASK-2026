<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AJ TEX Sarees Collection</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-danger">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#">AJ TEX</a>

        <button class="navbar-toggler" type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse"
            id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link active" href="#">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">Collections</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">About</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">Contact</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- Hero Section -->
<section class="bg-light text-center py-5">
    <div class="container">
        <h1 class="display-4 fw-bold">
            AJ TEX Sarees Collection
        </h1>
        <p class="lead">
            Premium Silk, Cotton & Designer Sarees
        </p>
        <button class="btn btn-danger btn-lg">
            Shop Now
        </button>
    </div>
</section>

<!-- Products -->
<section class="container py-5">
    <h2 class="text-center mb-4">Our Collections</h2>

    <div class="row g-4">

        <div class="col-md-4">
            <div class="card shadow">
                <img src="https://via.placeholder.com/400x300"
                     class="card-img-top"
                     alt="Silk Saree">

                <div class="card-body text-center">
                    <h5 class="card-title">
                        Kanchipuram Silk Saree
                    </h5>

                    <p class="text-danger fw-bold">
                        ₹2999
                    </p>

                    <button class="btn btn-danger">
                        Add to Cart
                    </button>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow">
                <img src="https://via.placeholder.com/400x300"
                     class="card-img-top"
                     alt="Cotton Saree">

                <div class="card-body text-center">
                    <h5 class="card-title">
                        Cotton Saree
                    </h5>

                    <p class="text-danger fw-bold">
                        ₹1499
                    </p>

                    <button class="btn btn-danger">
                        Add to Cart
                    </button>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow">
                <img src="https://via.placeholder.com/400x300"
                     class="card-img-top"
                     alt="Designer Saree">

                <div class="card-body text-center">
                    <h5 class="card-title">
                        Designer Saree
                    </h5>

                    <p class="text-danger fw-bold">
                        ₹3499
                    </p>

                    <button class="btn btn-danger">
                        Add to Cart
                    </button>
                </div>
            </div>
        </div>

    </div>
</section>

<!-- Contact -->
<section class="bg-light py-5">
    <div class="container">
        <h2 class="text-center mb-4">
            Contact Us
        </h2>

        <form class="mx-auto" style="max-width:600px;">
            <div class="mb-3">
                <input type="text"
                       class="form-control"
                       placeholder="Your Name">
            </div>

            <div class="mb-3">
                <input type="email"
                       class="form-control"
                       placeholder="Your Email">
            </div>

            <div class="mb-3">
                <textarea class="form-control"
                          rows="4"
                          placeholder="Message"></textarea>
            </div>

            <button class="btn btn-danger w-100">
                Send Message
            </button>
        </form>
    </div>
</section>

<!-- Footer -->
<footer class="bg-dark text-white text-center py-3">
    <p class="mb-0">
        © 2026 AJ TEX Sarees Collection
    </p>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
