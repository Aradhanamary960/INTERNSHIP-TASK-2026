<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AJ TEX - Tailwind CSS</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

    <!-- Header -->
    <header class="bg-red-900 text-white text-center py-5">
        <h1 class="text-4xl font-bold">AJ TEX</h1>
        <p class="mt-2">Premium Sarees Collection</p>
    </header>

    <!-- Hero Section -->
    <section class="text-center py-12 px-4">
        <h2 class="text-3xl font-bold mb-4">
            Discover Elegant Sarees
        </h2>
        <p class="text-gray-600 mb-6">
            Silk, Cotton and Designer Sarees for Every Occasion
        </p>

        <button
            class="bg-red-900 text-white px-6 py-3 rounded-lg hover:bg-red-700 transition">
            Shop Now
        </button>
    </section>

    <!-- Products -->
    <section class="max-w-7xl mx-auto px-4 py-8">
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">

            <!-- Product Card -->
            <div class="bg-white rounded-lg shadow-lg overflow-hidden hover:scale-105 transition">
                <img
                    src="https://via.placeholder.com/400x300"
                    alt="Silk Saree"
                    class="w-full">

                <div class="p-4">
                    <h3 class="text-xl font-semibold">
                        Kanchipuram Silk Saree
                    </h3>

                    <p class="text-red-900 font-bold mt-2">
                        ₹2999
                    </p>

                    <button
                        class="mt-4 w-full bg-red-900 text-white py-2 rounded hover:bg-red-700">
                        Add to Cart
                    </button>
                </div>
            </div>

            <!-- Product Card -->
            <div class="bg-white rounded-lg shadow-lg overflow-hidden hover:scale-105 transition">
                <img
                    src="https://via.placeholder.com/400x300"
                    alt="Cotton Saree"
                    class="w-full">

                <div class="p-4">
                    <h3 class="text-xl font-semibold">
                        Cotton Saree
                    </h3>

                    <p class="text-red-900 font-bold mt-2">
                        ₹1499
                    </p>

                    <button
                        class="mt-4 w-full bg-red-900 text-white py-2 rounded hover:bg-red-700">
                        Add to Cart
                    </button>
                </div>
            </div>

            <!-- Product Card -->
            <div class="bg-white rounded-lg shadow-lg overflow-hidden hover:scale-105 transition">
                <img
                    src="https://via.placeholder.com/400x300"
                    alt="Designer Saree"
                    class="w-full">

                <div class="p-4">
                    <h3 class="text-xl font-semibold">
                        Designer Saree
                    </h3>

                    <p class="text-red-900 font-bold mt-2">
                        ₹3499
                    </p>

                    <button
                        class="mt-4 w-full bg-red-900 text-white py-2 rounded hover:bg-red-700">
                        Add to Cart
                    </button>
                </div>
            </div>

        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-gray-900 text-white text-center py-4">
        © 2026 AJ TEX Sarees Collection
    </footer>

</body>
</html>
