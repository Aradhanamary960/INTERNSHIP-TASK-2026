<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AJ TEX Sarees Collection</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f5f5f5;
}

/* Header */
header{
    background:#8b0000;
    color:white;
    padding:15px;
    text-align:center;
}

header h1{
    font-size:32px;
}

/* Navigation */
nav{
    background:#222;
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
}

nav a{
    color:white;
    text-decoration:none;
    padding:15px;
}

nav a:hover{
    background:#444;
}

/* Hero Section */
.hero{
    text-align:center;
    padding:40px 20px;
    background:#ffe4e1;
}

.hero h2{
    margin-bottom:10px;
}

.hero button{
    margin-top:15px;
    padding:10px 20px;
    border:none;
    background:#8b0000;
    color:white;
    cursor:pointer;
    border-radius:5px;
}

/* Product Section */
.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:20px;
}

.card{
    background:white;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.card img{
    width:100%;
    height:300px;
    object-fit:cover;
}

.card-content{
    padding:15px;
    text-align:center;
}

.price{
    color:#8b0000;
    font-weight:bold;
    margin:10px 0;
}

.card button{
    background:#8b0000;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:5px;
    cursor:pointer;
}

/* Footer */
footer{
    background:#222;
    color:white;
    text-align:center;
    padding:15px;
    margin-top:20px;
}

/* Mobile Responsive */
@media(max-width:768px){

    header h1{
        font-size:24px;
    }

    nav{
        flex-direction:column;
    }

    nav a{
        border-bottom:1px solid #444;
        text-align:center;
    }

    .hero h2{
        font-size:22px;
    }

    .card img{
        height:250px;
    }
}
</style>
</head>
<body>

<header>
    <h1>AJ TEX</h1>
    <p>Premium Sarees Collection</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">Collections</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
</nav>

<section class="hero">
    <h2>Elegant Sarees For Every Occasion</h2>
    <p>Traditional • Modern • Designer Collections</p>
    <button>Shop Now</button>
</section>

<section class="products">

    <div class="card">
        <img src="https://via.placeholder.com/400x300" alt="Silk Saree">
        <div class="card-content">
            <h3>Kanchipuram Silk Saree</h3>
            <p class="price">₹2999</p>
            <button>Add to Cart</button>
        </div>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/400x300" alt="Cotton Saree">
        <div class="card-content">
            <h3>Cotton Saree</h3>
            <p class="price">₹1499</p>
            <button>Add to Cart</button>
        </div>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/400x300" alt="Designer Saree">
        <div class="card-content">
            <h3>Designer Saree</h3>
            <p class="price">₹3499</p>
            <button>Add to Cart</button>
        </div>
    </div>

</section>

<footer>
    <p>© 2026 AJ TEX Sarees Collection. All Rights Reserved.</p>
</footer>

</body>
</html>
