<!DOCTYPE html>
<html>
<head>
    <title>File Upload System</title>
</head>
<body>

    <h2>Upload File</h2>

    <form
        action="/upload"
        method="POST"
        enctype="multipart/form-data"
    >

        <input
            type="file"
            name="myFile"
            required
        >

        <br><br>

        <button type="submit">
            Upload
        </button>

    </form>

</body>
</html>
