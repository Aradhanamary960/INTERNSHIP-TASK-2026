<!DOCTYPE html>
<html>
<head>
    <title>Django User Management</title>
</head>
<body>

    <h2>User Management System</h2>

    <input type="text" id="name" placeholder="Enter Name">

    <input type="email" id="email" placeholder="Enter Email">

    <button onclick="addUser()">
        Add User
    </button>

    <hr>

    <div id="users"></div>

<script>

const API_URL =
"http://127.0.0.1:8000/api/users/";

async function loadUsers() {

    const response =
        await fetch(API_URL);

    const users =
        await response.json();

    let output = "";

    users.forEach(user => {

        output += `
            <p>
                ${user.name}
                -
                ${user.email}
            </p>
        `;
    });

    document.getElementById("users")
        .innerHTML = output;
}

async function addUser() {

    const name =
        document.getElementById("name").value;

    const email =
        document.getElementById("email").value;

    await fetch(API_URL, {

        method: "POST",

        headers: {
            "Content-Type":
            "application/json"
        },

        body: JSON.stringify({
            name,
            email
        })
    });

    loadUsers();
}

loadUsers();

</script>

</body>
</html>
