<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OTP Verification</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
        linear-gradient(135deg,#667eea 0%,#764ba2 100%);
    overflow:hidden;
}

/* Animated Background */
body::before{
    content:'';
    position:absolute;
    width:500px;
    height:500px;
    background:rgba(255,255,255,0.15);
    border-radius:50%;
    top:-200px;
    left:-150px;
    filter:blur(50px);
}

body::after{
    content:'';
    position:absolute;
    width:450px;
    height:450px;
    background:rgba(255,255,255,0.12);
    border-radius:50%;
    bottom:-180px;
    right:-150px;
    filter:blur(50px);
}

.card{
    position:relative;
    z-index:2;
    width:420px;
    padding:40px;
    border-radius:30px;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,0.25);
    box-shadow:0 20px 40px rgba(0,0,0,0.2);
    text-align:center;
    color:white;
}

.lock-icon{
    width:90px;
    height:90px;
    margin:auto;
    border-radius:50%;
    background:rgba(255,255,255,0.2);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:42px;
    margin-bottom:20px;
}

h1{
    margin-bottom:10px;
    font-size:28px;
}

.subtitle{
    opacity:.9;
    font-size:14px;
    margin-bottom:30px;
    line-height:1.5;
}

.email{
    font-weight:600;
}

.otp-container{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-bottom:30px;
}

.otp-input{
    width:55px;
    height:65px;
    border:none;
    border-radius:15px;
    text-align:center;
    font-size:24px;
    font-weight:700;
    background:rgba(255,255,255,0.2);
    color:white;
    outline:none;
    transition:.3s;
}

.otp-input:focus{
    transform:translateY(-4px);
    background:rgba(255,255,255,0.3);
    box-shadow:0 0 20px rgba(255,255,255,0.3);
}

.otp-input::placeholder{
    color:white;
}

.verify-btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:15px;
    background:white;
    color:#6b46c1;
    font-size:16px;
    font-weight:700;
    cursor:pointer;
    transition:.3s;
}

.verify-btn:hover{
    transform:translateY(-2px);
}

.timer{
    margin-top:20px;
    font-size:14px;
}

.resend{
    display:none;
    margin-top:15px;
    cursor:pointer;
    font-weight:600;
    color:#fff;
    text-decoration:underline;
}

.success-box{
    display:none;
    margin-top:20px;
    padding:15px;
    border-radius:15px;
    background:rgba(34,197,94,.2);
    border:1px solid rgba(34,197,94,.5);
    animation:fadeIn .5s ease;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(10px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@media(max-width:500px){

.card{
    width:95%;
    padding:30px 20px;
}

.otp-input{
    width:45px;
    height:55px;
}

}

</style>
</head>
<body>

<div class="card">

    <div class="lock-icon">🔐</div>

    <h1>Verify OTP</h1>

    <p class="subtitle">
        We've sent a 6-digit verification code to
        <br>
        <span class="email">yourmail@example.com</span>
    </p>

    <div class="otp-container">
        <input class="otp-input" maxlength="1">
        <input class="otp-input" maxlength="1">
        <input class="otp-input" maxlength="1">
        <input class="otp-input" maxlength="1">
        <input class="otp-input" maxlength="1">
        <input class="otp-input" maxlength="1">
    </div>

    <button class="verify-btn">
        Verify Account
    </button>

    <div class="timer">
        Resend OTP in
        <span id="countdown">60</span>s
    </div>

    <div class="resend" id="resendBtn">
        Resend OTP
    </div>

    <div class="success-box" id="successBox">
        ✅ OTP Verified Successfully!
    </div>

</div>

<script>

const inputs =
document.querySelectorAll('.otp-input');

inputs.forEach((input,index)=>{

    input.addEventListener('input',()=>{

        if(input.value.length === 1 &&
           index < inputs.length-1){
            inputs[index+1].focus();
        }
    });

    input.addEventListener('keydown',(e)=>{

        if(
            e.key === 'Backspace' &&
            input.value === '' &&
            index > 0
        ){
            inputs[index-1].focus();
        }
    });
});

/* Timer */

let seconds = 60;

const countdown =
document.getElementById('countdown');

const resendBtn =
document.getElementById('resendBtn');

const timer =
setInterval(()=>{

    seconds--;

    countdown.innerText = seconds;

    if(seconds <= 0){

        clearInterval(timer);

        document.querySelector('.timer')
        .style.display='none';

        resendBtn.style.display='block';
    }

},1000);

/* Resend */

resendBtn.addEventListener('click',()=>{

    alert('New OTP Sent Successfully');

    location.reload();
});

/* Verify */

document
.querySelector('.verify-btn')
.addEventListener('click',()=>{

    let otp='';

    inputs.forEach(box=>{
        otp += box.value;
    });

    if(otp.length !== 6){
        alert('Please enter all 6 digits');
        return;
    }

    // Example OTP
    const validOTP = "123456";

    if(otp === validOTP){

        document
        .getElementById('successBox')
        .style.display='block';

        document
        .querySelector('.verify-btn')
        .innerHTML='Verified ✓';

    }else{

        alert('Invalid OTP');
    }

});

</script>

</body>
</html>
