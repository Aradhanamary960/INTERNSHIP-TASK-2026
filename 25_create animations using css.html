<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AJ TEX - CSS Animations</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f5f5f5;
}

/* Header Animation */
header{
    background:#8B0000;
    color:white;
    text-align:center;
    padding:20px;
    animation: slideDown 1s ease;
}

@keyframes slideDown{
    from{
        transform:translateY(-100%);
        opacity:0;
    }
    to{
        transform:translateY(0);
        opacity:1;
    }
}

/* Hero Section */
.hero{
    text-align:center;
    padding:60px 20px;
}

.hero h1{
    animation: fadeIn 2s ease-in-out;
}

.hero p{
    margin-top:10px;
    animation: fadeIn 3s ease-in-out;
}

@keyframes fadeIn{
    from{
        opacity:0;
    }
    to{
        opacity:1;
    }
}

/* Animated Button */
.btn{
    margin-top:20px;
    padding:12px 25px;
    background:#8B0000;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.1);
}

/* Product Cards */
.products{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
    padding:20px;
}

.card{
    width:250px;
    background:white;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
    transition:0.4s;
    animation: zoomIn 1s ease;
}

.card:hover{
    transform:translateY(-10px);
}

.card img{
    width:100%;
}

.card-content{
    padding:15px;
    text-align:center;
}

@keyframes zoomIn{
    from{
        transform:scale(0.5);
        opacity:0;
    }
    to{
        transform:scale(1);
        opacity:1;
    }
}

/* Footer */
footer{
    background:#222;
    color:white;
    text-align:center;
    padding:15px;
    margin-top:30px;
}
</style>
</head>
<body>

<header>
    <h1>AJ TEX Sarees Collection</h1>
</header>

<section class="hero">
    <h1>Welcome to AJ TEX</h1>
    <p>Discover Premium Silk, Cotton & Designer Sarees</p>
    <button class="btn">Shop Now</button>
</section>

<section class="products">

    <div class="card">
        <img src="https://via.placeholder.com/250x250" alt="Silk Saree">
        <div class="card-content">
            <h3>Kanchipuram Silk Saree</h3>
            <p>₹2999</p>
        </div>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/250x250" alt="Cotton Saree">
        <div class="card-content">
            <h3>Cotton Saree</h3>
            <p>₹1499</p>
        </div>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/250x250" alt="Designer Saree">
        <div class="card-content">
            <h3>Designer Saree</h3>
            <p>₹3499</p>
        </div>
    </div>

</section>

<footer>
    <p>© 2026 AJ TEX. All Rights Reserved.</p>
</footer>

</body>
</html>
